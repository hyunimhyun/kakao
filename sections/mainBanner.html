<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div class="main_banner con-min-width border-red">
    <div class="con img-box border-blue">
      <img src="../imgs/kkb/main-bg3.png" alt="">
    </div>
  </div>

  <style>
    header {
      height: 80px;
      font-size: 15px;
      background-color: blanchedalmond;
    }

    header .logo_wrap > a {
      width: 116px;
    }

    header .logo_wrap > a > img {
      width: 100%;
    }

    /*dropdown menu */
    header .dropdown .dropBtn {
      background: rgba(244, 244, 244, 0.8);
      color: rgba(68,68,68,1);
      border: rgba(229,229,229,0.8);
      padding: 0 14px 0 18px;
      margin: 0 28px 0 14px;
      height: 40px;
      border-radius: 40px;
      cursor: pointer;
    }
    header .dropdown .dropBtn .ico {
      display: inline-block;
      margin-left: 5px;
    }

    /*글로벌 로고*/
    header .global_log {
      display: inline-block;
      width:20px;
    }
    header .golbal_log > img {
      width: 100%;
      display: block;
    }
    /*메인 배너 시작*/
    .main_banner {
      background-color: ffef6b;
    }
    /*메인 배너 끝*/
  </style>
</body>
</html>
