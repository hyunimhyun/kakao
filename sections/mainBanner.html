<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div class="main_banner con-min-width">
    <div class="con text_box">
      <h3>이미 모두의 은행<br>지금은 카카오뱅크</h3>
      <p>한 사람, 한 사람을 위해 시작한 은행이<br>더 많은 사람들이 찾는 모두의 은행</p>
      <p>보내고, 받고, 모으고, 쓰는<br>당신의 모든 일이 바뀌고 있습니다.</p>
      <img src="../imgs/kkb/main-bg3.png" alt="">
    <ul class="btns flex">
      <li><a href="#">Google Play</a></li>
      <li><a href="#">App Store</a></li>
    </ul>
  </div>

  <style>



    header {
      height: 80px;
      font-size: 15px;
      background-color: blanchedalmond;
    }

    header .logo_wrap > a {
      width: 116px;
    }

    header .logo_wrap > a > img {
      width: 100%;
    }

    /*dropdown menu */
    header .dropdown .dropBtn {
      background: rgba(244, 244, 244, 0.8);
      color: rgba(68,68,68,1);
      border: rgba(229,229,229,0.8);
      padding: 0 14px 0 18px;
      margin: 0 28px 0 14px;
      height: 40px;
      border-radius: 40px;
      cursor: pointer;
    }
    header .dropdown .dropBtn .ico {
      display: inline-block;
      margin-left: 5px;
    }

    /*글로벌 로고*/
    header .global_log {
      display: inline-block;
      width:20px;
    }
    header .golbal_log > img {
      width: 100%;
      display: block;
    }
    /*메인 배너 시작*/
    .main_banner {
      background-color: #ffef6b;
    }
    .main_banner .bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100;
      height: 720px;
      z-index: -1;
      background-color: ffef6b;
    }

  /*메인 배너 텍스트 시작*/
  .main_banner > .text_box > h3{
    font-size: 49px;

  }

  .main_banner > .text_box > p {
    font-size: 15px;
    line-height: 1.8;
    opacity: .7;
  }

  .main_banner > .text_box > .btns {
    margin-top: 30px;
  }

  .main_banner > .text_box > .btns > li:first-child {
    padding-right: 12px;
  }

  .main_banner > .text_box > .btns > a {
    display: block;
    width: 178px;
    height: 56px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 12px;
    font-size: 16.2px;
    font-weight: bold;
    line-height: 56px;
    color: #333;
    background-color: #fff;
    text-align: center;
  }
  /*메인 배너 텍스트 끝*/

    /*메인 배너 끝*/
  </style>
</body>
</html>
